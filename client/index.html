<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans min-h-screen">
  <div id="app" class="flex flex-col h-screen overflow-hidden">
    <header id="top-bar" class="h-12 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-3 shrink-0">
      <div class="flex items-center gap-2">
        <button id="btn-toggle-sidebar" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex items-center gap-2" title="Toggle sidebar">
          <span class="material-icons-outlined text-blue-600 text-xl">cloud</span>
          <span class="font-semibold text-sm">UDrive</span>
        </button>
        <div id="topbar-storage-donut" class="md:hidden"></div>
      </div>
      <div class="flex items-center gap-1">
        <button id="btn-toggle-theme" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle theme">
          <span class="material-icons-outlined text-xl">dark_mode</span>
        </button>
        <button id="btn-logout-topbar" class="hidden p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition-colors" title="Logout">
          <span class="material-icons-outlined text-xl">logout</span>
        </button>
      </div>
    </header>
    <div class="flex flex-1 overflow-hidden min-h-0">
      <aside id="sidebar" class="hidden md:flex w-64 border-r border-gray-200 dark:border-gray-700 flex-col shrink-0 transition-all duration-200"></aside>
      <main id="main-content" class="flex-1 overflow-auto pb-16 md:pb-0"></main>
    </div>
    <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 flex items-center overflow-x-auto h-14 scrollbar-hide">
      <a href="#/" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/">
        <span class="material-icons-outlined text-xl">folder</span>
        <span class="text-[10px] font-medium">Drive</span>
      </a>
      <a href="#/transfer" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/transfer">
        <span class="material-icons-outlined text-xl">swap_vert</span>
        <span class="text-[10px] font-medium">Transfers</span>
      </a>
      <a href="#/trash" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/trash">
        <span class="material-icons-outlined text-xl">delete</span>
        <span class="text-[10px] font-medium">Trash</span>
      </a>
      <a href="#/accounts" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/accounts">
        <span class="material-icons-outlined text-xl">people</span>
        <span class="text-[10px] font-medium">Accounts</span>
      </a>
      <a href="#/users" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/users">
        <span class="material-icons-outlined text-xl">admin_panel_settings</span>
        <span class="text-[10px] font-medium">Users</span>
      </a>
      <a href="#/activity" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/activity">
        <span class="material-icons-outlined text-xl">history</span>
        <span class="text-[10px] font-medium">Activity</span>
      </a>
      <a href="#/logs" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/logs">
        <span class="material-icons-outlined text-xl">terminal</span>
        <span class="text-[10px] font-medium">Logs</span>
      </a>
      <a href="#/api-access" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/api-access">
        <span class="material-icons-outlined text-xl">vpn_key</span>
        <span class="text-[10px] font-medium">API</span>
      </a>
      <a href="#/api-docs" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/api-docs">
        <span class="material-icons-outlined text-xl">menu_book</span>
        <span class="text-[10px] font-medium">Docs</span>
      </a>
      <a href="#/file-share" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/file-share">
        <span class="material-icons-outlined text-xl">share</span>
        <span class="text-[10px] font-medium">Share</span>
      </a>
      <a href="#/settings" class="mobile-nav-link flex flex-col items-center justify-center gap-0.5 py-1 px-3 rounded-lg" data-path="/settings">
        <span class="material-icons-outlined text-xl">settings</span>
        <span class="text-[10px] font-medium">Settings</span>
      </a>
    </nav>
  </div>
  <div id="toast-container" class="fixed bottom-16 md:bottom-4 right-4 z-50 flex flex-col gap-2"></div>
  <div id="context-menu" class="hidden fixed z-50"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
